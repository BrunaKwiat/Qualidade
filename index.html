<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitor de Excel Modernizado</title>
    <!-- Inclui Tailwind CSS para um estilo moderno e responsivo -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            color: #374151;
        }
        .container {
            max-width: 960px;
            margin: 40px auto;
            padding: 24px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        table {
            width: 100%;
            border-collapse: separate; /* Permite border-spacing */
            border-spacing: 0 8px; /* Espaçamento vertical entre as linhas */
            margin-top: 20px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            overflow: hidden; /* Garante que os cantos arredondados sejam aplicados */
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border: none; /* Remove a borda padrão */
        }
        th {
            background-color: #e9ecef;
            color: #495057;
            font-weight: 700;
            border-bottom: 2px solid #dee2e6;
        }
        tr:nth-child(even) {
            background-color: #f8f9fa;
        }
        tr:hover {
            background-color: #e2f4ff;
        }
        /* Arredondar os cantos da primeira e última célula do cabeçalho e da primeira e última linha */
        table thead tr th:first-child {
            border-top-left-radius: 8px;
        }
        table thead tr th:last-child {
            border-top-right-radius: 8px;
        }
        table tbody tr:last-child td:first-child {
            border-bottom-left-radius: 8px;
        }
        table tbody tr:last-child td:last-child {
            border-bottom-right-radius: 8px;
        }
    </style>
    <!-- Biblioteca SheetJS (XLSX) para leitura de arquivos Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="text-3xl font-bold text-center mb-6 text-gray-800">Visualizador de Dados Excel</h1>

        <div class="flex flex-col items-center mb-8">
            <label for="inputExcel" class="block text-lg font-medium text-gray-700 mb-4">
                Selecione um arquivo Excel (.xlsx, .xls)
            </label>
            <input type="file" id="inputExcel" accept=".xlsx, .xls"
                   class="block w-full max-w-sm text-sm text-gray-900
                          bg-gray-50 rounded-lg border border-gray-300
                          cursor-pointer focus:outline-none focus:border-blue-500
                          file:mr-4 file:py-2 file:px-4
                          file:rounded-full file:border-0
                          file:text-sm file:font-semibold
                          file:bg-blue-50 file:text-blue-700
                          hover:file:bg-blue-100">
            <p id="loadingMessage" class="mt-4 text-blue-600 font-medium hidden">
                Carregando e processando...
            </p>
            <p id="errorMessage" class="mt-4 text-red-600 font-medium hidden">
                Ocorreu um erro ao processar o arquivo. Por favor, tente novamente.
            </p>
        </div>

        <div class="overflow-x-auto">
            <table id="tabelaExcel" class="min-w-full divide-y divide-gray-200">
                <thead>
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Coluna 1</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Coluna 2</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Coluna 3</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Coluna 4</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Coluna 5</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Coluna 6</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <!-- Dados do Excel serão inseridos aqui -->
                    <tr>
                        <td colspan="6" class="text-center py-8 text-gray-500">
                            Nenhum arquivo carregado. Por favor, selecione um arquivo Excel.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Seleciona os elementos do DOM
        const inputExcel = document.getElementById('inputExcel');
        const tabelaExcelBody = document.querySelector('#tabelaExcel tbody');
        const loadingMessage = document.getElementById('loadingMessage');
        const errorMessage = document.getElementById('errorMessage');

        /**
         * Lida com a seleção do arquivo, lê e processa o conteúdo Excel.
         * @param {Event} e - O evento de mudança do input de arquivo.
         */
        async function handleFile(e) {
            // Esconde mensagens anteriores e mostra o indicador de carregamento
            errorMessage.classList.add('hidden');
            loadingMessage.classList.remove('hidden');
            tabelaExcelBody.innerHTML = ''; // Limpa a tabela existente

            const file = e.target.files[0];
            if (!file) {
                loadingMessage.classList.add('hidden');
                errorMessage.textContent = 'Nenhum arquivo selecionado.';
                errorMessage.classList.remove('hidden');
                return;
            }

            try {
                // Lê o arquivo como um ArrayBuffer usando uma Promise para async/await
                const data = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (event) => resolve(new Uint8Array(event.target.result));
                    reader.onerror = (error) => reject(error);
                    reader.readAsArrayBuffer(file);
                });

                // Processa o workbook Excel
                const workbook = XLSX.read(data, { type: 'array' });
                // Pega a primeira planilha do workbook
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                // Converte a planilha para JSON (array de arrays, onde a primeira é o cabeçalho)
                const jsonData = XLSX.utils.sheet_to_json(sheet, { header: 1 });

                // Verifica se há dados para exibir (pelo menos o cabeçalho)
                if (!jsonData || jsonData.length === 0) {
                    tabelaExcelBody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-gray-500">
                        O arquivo Excel está vazio ou não contém dados.
                    </td></tr>`;
                    return;
                }

                // Extrai o cabeçalho da primeira linha (opcional, se quiser usar os nomes das colunas do Excel)
                // const headers = jsonData[0]; // Se quiser usar os nomes do Excel para o <thead>
                // console.log("Cabeçalhos do Excel:", headers);

                // Constrói as linhas da tabela, pulando a primeira linha (cabeçalho) do jsonData
                const rowsHtml = jsonData.slice(1).map(row => {
                    // Limita a 6 colunas, preenchendo com string vazia se a célula não existir
                    const cells = Array.from({ length: 6 }, (_, j) => `<td>${row[j] !== undefined ? row[j] : ''}</td>`).join('');
                    return `<tr>${cells}</tr>`;
                }).join('');

                // Insere o HTML gerado no corpo da tabela
                tabelaExcelBody.innerHTML = rowsHtml;

                // Se não houver dados após pular o cabeçalho
                if (jsonData.slice(1).length === 0) {
                    tabelaExcelBody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-gray-500">
                        O arquivo Excel não contém dados além do cabeçalho.
                    </td></tr>`;
                }

            } catch (error) {
                console.error('Erro ao processar o arquivo Excel:', error);
                errorMessage.textContent = `Erro ao processar o arquivo: ${error.message || 'Verifique o formato do arquivo.'}`;
                errorMessage.classList.remove('hidden');
                tabelaExcelBody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-red-500">
                    Falha ao carregar os dados.
                </td></tr>`;
            } finally {
                // Esconde o indicador de carregamento
                loadingMessage.classList.add('hidden');
            }
        }

        // Adiciona o event listener ao input de arquivo
        inputExcel.addEventListener('change', handleFile);

        // Mensagem inicial se a tabela estiver vazia
        if (tabelaExcelBody.children.length === 0) {
            tabelaExcelBody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-gray-500">
                Nenhum arquivo carregado. Por favor, selecione um arquivo Excel.
            </td></tr>`;
        }
    </script>
</body>
</html>
