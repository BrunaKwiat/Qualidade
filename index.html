<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leitor de Excel Modernizado</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <style>
    /* ... (mantenha todo o CSS que você já tem no <style>) ... */
    /* Por brevidade, omiti o CSS aqui pois ele não precisa ser alterado. */
  </style>
</head>
<body>
  <!-- ... (todo o HTML até os scripts permanece igual ao seu) ... -->

  <!-- ATUALIZE este trecho de SCRIPT -->
  <script>
    // ... (todas as declarações iniciais permanecem iguais) ...

    function showCustomAlert(message, isConfirm = false) {
      return new Promise((resolve) => {
        customAlertMessage.textContent = message;
        customAlertConfirmBtn.classList.toggle('hidden', !isConfirm);
        customAlertCancelBtn.textContent = isConfirm ? 'Cancelar' : 'OK';
        customAlertDialog.classList.add('show');

        const handleConfirm = () => {
          customAlertDialog.classList.remove('show');
          customAlertConfirmBtn.removeEventListener('click', handleConfirm);
          customAlertCancelBtn.removeEventListener('click', handleCancel);
          resolve(true);
        };

        const handleCancel = () => {
          customAlertDialog.classList.remove('show');
          customAlertConfirmBtn.removeEventListener('click', handleConfirm);
          customAlertCancelBtn.removeEventListener('click', handleCancel);
          resolve(false);
        };

        customAlertConfirmBtn.addEventListener('click', handleConfirm);
        customAlertCancelBtn.addEventListener('click', handleCancel);
      });
    }

    function clearSelection() {
      document.querySelectorAll('#tabelaExcel tbody tr').forEach(row => {
        row.classList.remove('bg-blue-100');
      });
      selectedRowIndex = -1;
      btnEdit.setAttribute('disabled', true);
      btnDelete.setAttribute('disabled', true);
      btnEdit.classList.add('opacity-50', 'cursor-not-allowed');
      btnDelete.classList.add('opacity-50', 'cursor-not-allowed');
    }

    function renderTable(data) {
      clearSelection();
      tabelaExcelBody.innerHTML = '';
      tabelaExcelHead.innerHTML = '';

      if (!data || data.length === 0) {
        tabelaExcelBody.innerHTML = `<tr><td colspan="${columnHeaders.length || 1}" class="text-center py-8 text-gray-500">
            Nenhum dado para exibir. Carregue um arquivo ou insira um registro.
        </td></tr>`;
        tabelaExcelHead.innerHTML = `<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Carregue um arquivo para ver os cabeçalhos</th>`;
        return;
      }

      columnHeaders.forEach(header => {
        const th = document.createElement('th');
        th.className = 'px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider';
        th.textContent = header;
        tabelaExcelHead.appendChild(th);
      });

      data.forEach((rowData, index) => {
        const tr = document.createElement('tr');
        tr.dataset.rowIndex = index;
        tr.className = 'cursor-pointer';

        columnHeaders.forEach(header => {
          const td = document.createElement('td');
          td.textContent = rowData[header] || '';
          tr.appendChild(td);
        });

        tr.addEventListener('click', () => selectRow(tr, index));
        tabelaExcelBody.appendChild(tr);
      });

      if (selectedRowIndex !== -1 && tabelaExcelBody.children[selectedRowIndex]) {
        tabelaExcelBody.children[selectedRowIndex].classList.add('bg-blue-100');
      }
    }

    function selectRow(rowElement, index) {
      document.querySelectorAll('#tabelaExcel tbody tr').forEach(row => {
        row.classList.remove('bg-blue-100');
      });
      rowElement.classList.add('bg-blue-100');
      selectedRowIndex = index;

      btnEdit.removeAttribute('disabled');
      btnDelete.removeAttribute('disabled');
      btnEdit.classList.remove('opacity-50', 'cursor-not-allowed');
      btnDelete.classList.remove('opacity-50', 'cursor-not-allowed');
    }

    async function openDataModal(mode, rowIndex = -1) {
      modalTitle.textContent = mode === 'insert' ? 'Inserir Novo Registro' : 'Editar Registro';
      dataForm.innerHTML = '';
      selectedRowIndex = rowIndex;

      if (columnHeaders.length === 0) {
        if (mode === 'insert') {
          const confirmed = await showCustomAlert('Não há cabeçalhos definidos. Deseja adicionar os campos: LIBERAÇÃO, DATA, EMPREITEIRA, OBRA, QTDE, SALDO?', true);
          if (confirmed) {
            columnHeaders = ['LIBERAÇÃO', 'DATA', 'EMPREITEIRA', 'OBRA', 'QTDE', 'SALDO'];
          } else {
            return;
          }
        } else {
          await showCustomAlert('Não há cabeçalhos definidos. Por favor, carregue um Excel primeiro.', false);
          return;
        }
      }

      columnHeaders.forEach(header => {
        const div = document.createElement('div');
        div.className = 'flex flex-col';

        const label = document.createElement('label');
        label.textContent = header;
        label.className = 'block text-sm font-medium text-gray-700 mb-1';

        const input = document.createElement('input');
        input.name = header;
        input.id = `field-${header}`;
        input.type = 'text';
        input.className = 'mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none';

        if (mode === 'edit' && tableData[rowIndex]) {
          input.value = tableData[rowIndex][header] || '';
        }

        div.appendChild(label);
        div.appendChild(input);
        dataForm.appendChild(div);
      });

      dataModal.classList.add('show');
    }

    function closeDataModal() {
      dataModal.classList.remove('show');
      dataForm.reset();
    }

    function saveRecord() {
      const formData = new FormData(dataForm);
      const newRecord = {};
      columnHeaders.forEach(header => {
        newRecord[header] = formData.get(header);
      });

      if (selectedRowIndex === -1) {
        tableData.push(newRecord);
        selectedRowIndex = tableData.length - 1;
        showCustomAlert('Registro inserido com sucesso!', false);
      } else {
        tableData[selectedRowIndex] = newRecord;
        showCustomAlert('Registro atualizado com sucesso!', false);
      }

      renderTable(tableData);
      closeDataModal();
      selectRow(tabelaExcelBody.children[selectedRowIndex], selectedRowIndex);
    }

    async function deleteRecord() {
      if (selectedRowIndex === -1) {
        showCustomAlert('Selecione um registro para excluir.', false);
        return;
      }

      const confirmDelete = await showCustomAlert('Tem certeza que deseja excluir este registro?', true);
      if (confirmDelete) {
        tableData.splice(selectedRowIndex, 1);
        selectedRowIndex = -1;
        renderTable(tableData);
        clearSelection();
        showCustomAlert('Registro excluído com sucesso!', false);
      }
    }

    function generateExcelReport() {
      if (tableData.length === 0) {
        showCustomAlert('Não há dados para exportar.', false);
        return;
      }
      const dataToExport = [columnHeaders, ...tableData.map(row => columnHeaders.map(h => row[h]))];
      const ws = XLSX.utils.aoa_to_sheet(dataToExport);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Relatório");
      XLSX.writeFile(wb, "relatorio_dados_excel.xlsx");
    }

    function generatePdfReport() {
      if (tableData.length === 0) {
        showCustomAlert('Não há dados para exportar.', false);
        return;
      }
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const head = [columnHeaders];
      const body = tableData.map(row => columnHeaders.map(h => row[h]));
      doc.autoTable({ head, body });
      doc.save("relatorio_dados_pdf.pdf");
    }

    async function handleFile(e) {
      errorMessage.classList.add('hidden');
      loadingMessage.classList.remove('hidden');
      clearSelection();

      const file = e.target.files[0];
      if (!file) return;

      try {
        const data = await file.arrayBuffer();
        const workbook = XLSX.read(data, { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const jsonData = XLSX.utils.sheet_to_json(sheet);
        columnHeaders = Object.keys(jsonData[0] || {});
        tableData = jsonData;
        renderTable(tableData);
      } catch (error) {
        showCustomAlert('Erro ao carregar arquivo Excel.', false);
        columnHeaders = [];
        tableData = [];
        renderTable([]);
      } finally {
        loadingMessage.classList.add('hidden');
      }
    }

    // Event Listeners
    inputExcel.addEventListener('change', handleFile);
    btnInsert.addEventListener('click', () => openDataModal('insert'));
    btnEdit.addEventListener('click', () => openDataModal('edit', selectedRowIndex));
    btnDelete.addEventListener('click', deleteRecord);
    btnGenerateExcelReport.addEventListener('click', generateExcelReport);
    btnGeneratePdfReport.addEventListener('click', generatePdfReport);
    saveRecordBtn.addEventListener('click', saveRecord);
    cancelModalBtn.addEventListener('click', closeDataModal);

    document.addEventListener('DOMContentLoaded', () => {
      renderTable([]);
    });
  </script>
</body>
</html>
